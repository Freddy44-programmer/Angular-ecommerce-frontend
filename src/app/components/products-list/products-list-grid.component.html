<div class="main-content">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <div class="row">
        <!-- loop over the collection of products -->
        <div class="col-lg-3" *ngFor="let tempProduct of products">
          <div class="card">
            <a routerLink="/products/{{tempProduct.id}}">
              <img  [src]="tempProduct.imageUrl" class="img-responsive" />
            </a>

            <div class="card-body">
              <a routerLink="/products/{{tempProduct.id}}">
              <h5 class="card-title" [title]="tempProduct.name">
                {{
                  tempProduct.name.length > 30? tempProduct.name.slice(0, 30) + "...": tempProduct.name
                }}
              </h5>
            </a>
            
              <p class="card-text">
                Price: {{ tempProduct.unitPrice | currency : "R" }}
              </p>
              <button (click)="addToCart(tempProduct)" class="btn btn-outline-success">
                +
                <i class="fa fa-shopping-cart" aria-hidden="true"></i>
                Add to cart
              </button>
            </div>
          </div>
        </div>

        <!--display the following message if products is not found-->
        <div
          #userInput
          *ngIf="products?.length == 0"
          class="alert alert-warning col-md-12"
          role="alert"
        >
          <h4>No results found!</h4>
          <p>Please check your spelling or try a more generic search term.</p>
        </div>
      </div>

           <!--begin footer-->
           <div class="footer-pagination">
             <div class="row">
              <div class="col-md-6"></div>

              <div class="col-md-6">
                <div class="row">
                  <div class="col-md-9" style=" padding-left: 30%">
                     <!-- <ngb-pagination [(page)]="thePageNumber"
                                     [pageSize]="thePageSize"
                                     [collectionSize]="theTotalElements"
                                     (pageChange)="listProducts()">

                     </ngb-pagination> -->
                  </div>
                </div>
              </div>
             </div>
           </div>

            <!--end footer-->

    </div>
  </div>
</div>
