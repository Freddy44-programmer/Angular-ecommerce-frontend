<div class="main-content">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <div class="row">
        <!-- loop over the collection of products -->
        <div class="col-sm-3" *ngFor="let tempProduct of products">
          <div class="card">
            <a routerLink="/products/{{tempProduct.id}}">
              <img  [src]="tempProduct.imageUrl" class="img-responsive" />
            </a>

            <div class="card-body">
              <a routerLink="/products/{{tempProduct.id}}">
              <h5 class="card-title" [title]="tempProduct.name">
                {{
                  tempProduct.name.length > 32? tempProduct.name.slice(0, 32) + "...": tempProduct.name
                }}
              </h5>
            </a>
            
              <p class="card-text">
                Price: {{ tempProduct.unitPrice | currency : "R" }}
              </p>
              <button href="#" class="btn btn-outline-success">
                +
                <i class="fa fa-shopping-cart" aria-hidden="true"></i>
                Add to cart
              </button>
            </div>
          </div>
        </div>

        <!--display the following message if products is not found-->
        <div
          #userInput
          *ngIf="products?.length == 0"
          class="alert alert-warning col-md-12"
          role="alert"
        >
          <h4>No results found!</h4>
          <p>Please check your spelling or try a more generic search term.</p>
        </div>
      </div>
    </div>
  </div>
</div>
