
<div class="main-content">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <div class="row">
        <!-- loop over the collection of products -->
        <div class="col-sm-3" *ngFor="let tempProduct of products">
          <div class="card">
            <img
              [src]="tempProduct.imageUrl"
              class="card-img-top"
              alt="Product Image"
            />
            <div class="card-body">
            <h5 class="card-title" [title]="tempProduct.name">{{ tempProduct.name.length > 32 ? tempProduct.name.slice(0, 32) + '...' : tempProduct.name }}</h5>
              <p class="card-text">
                Price: {{ tempProduct.unitPrice | currency : "R" }}
              </p>
              <button href="#" class="btn btn-outline-success"> +
                <i class="fa fa-shopping-cart" aria-hidden="true"></i>
               Add to cart
            </button>
            </div>
          </div>
        </div>
      </div>
    </div>
